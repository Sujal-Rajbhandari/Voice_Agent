<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Nexus Voice — The AI agent that answers your phone</title>
    <meta
      name="description"
      content="Nexus Voice puts an AI agent on your business phone line. It answers every call, takes reservations, handles cancellations, and runs outbound follow-up campaigns — with a clean transcript of everything."
    />
    <meta name="theme-color" content="#0A1521" />
    <script>
      try {
        var t = localStorage.getItem('nexusTheme');
        if (t !== 'light' && t !== 'dark') {
          t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
